services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: cmdb-backend
    restart: unless-stopped
    volumes:
      - ../data:/app/data
      - ../uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./data/cmdb.db
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      # 按需设置：填值则 Docker 与 Windows 两模式初始密码一致，留空则各自随机
      - CMDB_INITIAL_ADMIN_PASSWORD=${CMDB_INITIAL_ADMIN_PASSWORD:-}
      # 纯 HTTP 内网部署保持 false；启用 HTTPS 后改为 true
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    secrets:
      - jwt_secret
    networks:
      - cmdb-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: cmdb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cmdb-net

networks:
  cmdb-net:
    driver: bridge

secrets:
  jwt_secret:
    file: ../secrets/jwt_secret.txt

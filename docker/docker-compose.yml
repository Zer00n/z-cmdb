services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: cmdb-backend
    restart: unless-stopped
    volumes:
      - ../data:/app/data
      - ../uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./data/cmdb.db
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    secrets:
      - jwt_secret
    networks:
      - cmdb-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: cmdb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cmdb-net

networks:
  cmdb-net:
    driver: bridge

secrets:
  jwt_secret:
    file: ../secrets/jwt_secret.txt

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>CMDB Lite · 登录</title>
<meta name="viewport" content="width=1280" />
<link rel="stylesheet" href="tokens.css" />
<style>
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  min-width: 1280px;
  /* 极轻的双色调，避免单调；不使用大面积渐变 */
  background:
    radial-gradient(1200px 600px at 50% -200px, #EEF2FA 0%, transparent 65%),
    var(--neutral-50);
}

/* Header dot pattern in top right (very subtle, monospace-grid feel) */
.bg-grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(15,23,42,0.04) 1px, transparent 0);
  background-size: 32px 32px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 60%);
  -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 60%);
}

.shell {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-12) var(--space-6);
}

.card {
  width: 420px;
  background: var(--neutral-0);
  border: 1px solid var(--neutral-200);
  border-radius: var(--radius-lg);
  padding: var(--space-8) var(--space-8) var(--space-6);
  box-shadow: var(--shadow-subtle);
}

.brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-2);
}
.brand .logo {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  background: var(--color-primary-500);
  position: relative;
  flex-shrink: 0;
  /* 占位 logo：两块色块表示分层资产 */
}
.brand .logo::before,
.brand .logo::after {
  content: "";
  position: absolute;
  background: rgba(255,255,255,0.9);
  border-radius: 1.5px;
}
.brand .logo::before { left: 7px; top: 9px; width: 18px; height: 4px; }
.brand .logo::after  { left: 7px; top: 19px; width: 12px; height: 4px; }
.brand .name {
  font-size: 20px;
  line-height: 28px;
  font-weight: 600;
  color: var(--neutral-900);
  letter-spacing: -0.01em;
}
.brand .name em {
  font-style: normal;
  color: var(--color-primary-500);
}

.subtitle {
  color: var(--neutral-500);
  font-size: var(--fs-body);
  margin: 0 0 var(--space-8) 0;
}

/* Form */
.form { display: flex; flex-direction: column; gap: var(--space-4); }
.field { display: flex; flex-direction: column; gap: var(--space-2); }
.field .lbl {
  font-size: var(--fs-caption);
  line-height: var(--lh-caption);
  color: var(--neutral-500);
}
.input-wrap { position: relative; display: block; }
.input-wrap .ico {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--neutral-400);
  display: inline-flex; align-items: center; justify-content: center;
}
.input {
  width: 100%;
  height: 40px;
  padding: 0 12px 0 38px;
  border-radius: var(--radius-md);
  border: 1px solid var(--neutral-300);
  background: var(--neutral-0);
  font-size: var(--fs-body);
  color: var(--neutral-900);
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.input::placeholder { color: var(--neutral-400); }
.input:hover { border-color: var(--neutral-400); }
.input:focus {
  border-color: var(--color-primary-500);
  box-shadow: 0 0 0 3px var(--color-primary-100);
}

/* Password reveal */
.reveal {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: transparent; border: 0; padding: 6px;
  color: var(--neutral-400); cursor: pointer; border-radius: var(--radius-sm);
  display: inline-flex; align-items: center;
}
.reveal:hover { color: var(--neutral-700); background: var(--neutral-100); }

/* Checkbox row */
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: -2px;
}
.checkbox {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  cursor: pointer;
  user-select: none;
  font-size: var(--fs-body);
  color: var(--neutral-700);
}
.checkbox input { position: absolute; opacity: 0; }
.checkbox .box {
  width: 16px; height: 16px;
  border: 1px solid var(--neutral-300);
  border-radius: 3px;
  background: var(--neutral-0);
  display: inline-flex; align-items: center; justify-content: center;
  transition: background-color .12s, border-color .12s;
}
.checkbox input:checked + .box {
  background: var(--color-primary-500);
  border-color: var(--color-primary-500);
}
.checkbox input:checked + .box::after {
  content: "";
  width: 9px; height: 5px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translate(1px, -1px);
}
.row .hint {
  font-size: var(--fs-caption);
  color: var(--neutral-500);
}
.row .hint b { color: var(--neutral-700); font-weight: 500; }

/* Submit */
.btn-primary {
  height: 40px;
  border: 0;
  background: var(--color-primary-500);
  color: var(--neutral-0);
  border-radius: var(--radius-md);
  font-size: var(--fs-body);
  font-weight: 500;
  cursor: pointer;
  margin-top: var(--space-2);
  transition: background-color .12s ease, box-shadow .15s ease;
}
.btn-primary:hover { background: var(--color-primary-600); box-shadow: var(--shadow-subtle); }
.btn-primary:active { background: var(--color-primary-700); }

/* Help line */
.help-line {
  margin-top: var(--space-6);
  padding-top: var(--space-4);
  border-top: 1px solid var(--neutral-200);
  font-size: var(--fs-caption);
  color: var(--neutral-500);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.help-line .key {
  font-family: var(--font-mono);
  background: var(--neutral-100);
  color: var(--neutral-700);
  padding: 1px 6px;
  border-radius: 3px;
  border: 1px solid var(--neutral-200);
  font-size: 11px;
}

/* Footer */
.foot {
  text-align: center;
  padding: 0 var(--space-6) var(--space-8);
  font-size: var(--fs-caption);
  color: var(--neutral-400);
  line-height: var(--lh-caption);
  font-family: var(--font-mono);
}
.foot .sep { color: var(--neutral-300); margin: 0 var(--space-2); }
</style>
</head>
<body>
<div class="bg-grid"></div>

<main class="shell">
  <div style="display:flex; flex-direction:column; align-items:center;">

    <div class="card" data-screen-label="Login Card">
      <div class="brand">
        <span class="logo" aria-hidden="true"></span>
        <span class="name">CMDB <em>Lite</em></span>
      </div>
      <p class="subtitle">轻量级资产配置管理系统</p>

      <form class="form" onsubmit="event.preventDefault();">
        <div class="field">
          <label class="lbl" for="u">用户名</label>
          <span class="input-wrap">
            <span class="ico" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="5.5" r="2.75"/>
                <path d="M2.5 13.5c.7-2.4 2.9-4 5.5-4s4.8 1.6 5.5 4"/>
              </svg>
            </span>
            <input class="input" id="u" type="text" autocomplete="username" placeholder="请输入用户名 / 邮箱" />
          </span>
        </div>

        <div class="field">
          <label class="lbl" for="p">密码</label>
          <span class="input-wrap">
            <span class="ico" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2.75" y="7" width="10.5" height="6.5" rx="1.25"/>
                <path d="M5 7V4.75A3 3 0 0 1 11 4.75V7"/>
              </svg>
            </span>
            <input class="input" id="p" type="password" autocomplete="current-password" placeholder="请输入密码" />
            <button type="button" class="reveal" aria-label="显示密码" onclick="
              var i=document.getElementById('p');
              i.type = i.type==='password' ? 'text' : 'password';
            ">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1.5 8s2.5-4.5 6.5-4.5S14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8z"/>
                <circle cx="8" cy="8" r="1.75"/>
              </svg>
            </button>
          </span>
        </div>

        <div class="row">
          <label class="checkbox">
            <input type="checkbox" checked />
            <span class="box" aria-hidden="true"></span>
            <span>记住我（7 天）</span>
          </label>
          <span class="hint">仅在受信任的设备勾选</span>
        </div>

        <button type="submit" class="btn-primary">登 录</button>
      </form>

      <div class="help-line">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6"/>
          <path d="M6.5 6.25c0-.97.79-1.75 1.75-1.75s1.75.78 1.75 1.75c0 .97-1.75 1.25-1.75 2.5"/>
          <circle cx="8" cy="11.25" r=".25" fill="currentColor"/>
        </svg>
        忘记密码？请联系系统管理员（或在内部 IM 搜索 <b style="font-family:var(--font-mono); color:var(--neutral-700); margin: 0 4px;">@cmdb-ops</b>）
      </div>
    </div>

    <!-- Hint chips below card -->
    <div style="margin-top: var(--space-6); display:flex; gap: var(--space-3); font-size: var(--fs-caption); color: var(--neutral-500); font-family: var(--font-mono);">
      <span style="display:inline-flex; align-items:center; gap:6px;">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--color-success);"></span>
        服务正常
      </span>
      <span style="color:var(--neutral-300);">·</span>
      <span>登录尝试受限：5 次 / 10 分钟</span>
      <span style="color:var(--neutral-300);">·</span>
      <span>仅限企业内网访问</span>
    </div>

  </div>
</main>

<footer class="foot">
  CMDB Lite v1.4.2 (build 2026.05.18)
  <span class="sep">·</span>
  © 2026 内部运维平台
  <span class="sep">·</span>
  Support: cmdb-support@internal
</footer>

</body>
</html>

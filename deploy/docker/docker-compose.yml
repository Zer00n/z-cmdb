services:
  cmdb:
    image: z-cmdb-app:0.6
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/backend/data
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/backend/data/cmdb.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - CORS_ORIGINS=["http://localhost:8000"]
      # 无人值守自动解锁：启动时注入口令（绝不写入宿主机 .env）：
      #   CMDB_UNLOCK_PASSWORD: ${CMDB_UNLOCK_PASSWORD:-}
      # 用法：CMDB_UNLOCK_PASSWORD="xxx" docker compose up -d
    restart: unless-stopped
